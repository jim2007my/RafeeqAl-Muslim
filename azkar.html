<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الأذكار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Amiri+Quran&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #F7F9F8;
            color: #2C3E35;
            min-height: 100vh;
            padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px)) !important;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.02"><path fill="none" stroke="%232C3E35" stroke-width="1" d="M400 50 L450 150 L550 150 L475 225 L500 325 L400 275 L300 325 L325 225 L250 150 L350 150 Z M400 50 L400 275 M475 225 L325 225 M500 325 L300 325 M450 150 L350 150"/><circle cx="400" cy="400" r="80" stroke="%232C3E35" fill="none"/><circle cx="400" cy="400" r="120" stroke="%232C3E35" fill="none" stroke-dasharray="5 5"/></svg>');
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* 🌟 Header & Tabs (بعد تثبيته في أعلى الشاشة) 🌟 */
        .header-section {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95); /* شفافية زجاجية شيك */
            backdrop-filter: blur(10px); /* تأثير الزجاج */
            -webkit-backdrop-filter: blur(10px);
            border-radius: 0 0 28px 28px; /* الدوران من تحت بس */
            padding: 15px 16px;
            border-bottom: 1px solid #E8EFEA;
            box-shadow: 0 8px 24px rgba(44, 62, 53, 0.08);
            z-index: 1000;
        }

        /* تنسيقات التابات وشريط التقدم (بدون تغيير) */
        .tabs-container {
            display: flex;
            background: #F7F9F8;
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 7px;
            border: 1px solid #E8EFEA;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: #7A938C;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: #0A6C58;
            color: #FFFFFF;
            box-shadow: 0 4px 12px rgba(10, 108, 88, 0.2);
        }

        /* 🌟 Progress Bar 🌟 */
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 10px;
            background: #E8EFEA;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #0A6C58;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text {
            font-size: 0.85rem;
            font-weight: 700;
            color: #0A6C58;
            min-width: 45px;
            text-align: left;
        }

        /* 🌟 Zikr Cards (Tappable Entirely) 🌟 */
        .zikr-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 130px; /* 🌟 مهم جداً: مسافة عشان الأذكار متستخباش تحت الهيدر الثابت 🌟 */
        }

        .zikr-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 24px 16px 16px; 
            border: 1px solid #E8EFEA;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s;
            position: relative;
            cursor: pointer; /* مؤشر اليد يظهر للمستخدم */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* تأثير ضغطة الزر على الكارت بالكامل */
        .zikr-card:active {
            transform: scale(0.96);
            background: #F9FCFA;
            border-color: #CCE5DB;
        }

        .zikr-card.completed {
            background: #FAFCFB;
            opacity: 0.65;
            border-color: #D1E5DE;
            cursor: default; /* إلغاء التفاعل بعد الاكتمال */
            transform: scale(1); /* منع التصغير بعد الاكتمال */
        }

        /* 🌟 عداد الأذكار (Badge) 🌟 */
        .count-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #E4F1EC;
            color: #0A6C58;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            border: 1px solid #CCE5DB;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(10, 108, 88, 0.08);
        }

        .count-badge.done {
            background: #0A6C58;
            color: #FFFFFF;
            border-color: #0A6C58;
        }

        /* حركة (Pop) للعداد عند الضغط */
        @keyframes popAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        .count-badge.pop {
            animation: popAnim 0.2s ease-out;
        }

        .zikr-text {
            font-family: 'Amiri Quran', 'Amiri', serif;
            font-size: 1.45rem;
            line-height: 1.9;
            color: #2C3E35;
            text-align: center;
            margin-top: 12px; /* مسافة للعداد */
            margin-bottom: 12px;
        }

        .zikr-fadl {
            background: rgba(10, 108, 88, 0.04);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #7A938C;
            text-align: center;
            margin: 0 auto;
            border: none;
            display: none;
            width: fit-content;
        }

        .zikr-fadl.has-content {
            display: block;
        }

        /* =========================================
           كود شريط التنقل السفلي الموحد لجميع الصفحات
           ========================================= */
        .bottom-nav-fixed {
            position: fixed !important;
            bottom: 0 !important;
            left: 0;
            right: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid #E8EFEA;
            box-shadow: 0 -4px 20px rgba(44, 62, 53, 0.04);
            z-index: 99999 !important; 
            padding: 8px 16px calc(8px + env(safe-area-inset-bottom, 0px)) !important;
            transform: translate3d(0, 0, 0) !important; 
            -webkit-transform: translate3d(0, 0, 0) !important;
            will-change: transform; 
            contain: layout; 
        }

        .nav-inner {
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 8px;
        }

        .nav-item-bottom {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            color: #7A938C;
            background: transparent;
            border-radius: 20px;
            padding: 6px 0;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s ease-in-out;
        }

        .nav-item-bottom i {
            font-size: 1.25rem;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .nav-item-bottom span {
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: -0.2px;
            transition: font-weight 0.2s ease, color 0.2s ease;
        }

        .nav-item-bottom:active {
            transform: scale(0.95);
        }

        .nav-item-bottom.active { 
            color: #0A6C58; 
        }
        .nav-item-bottom.active i { 
            color: #0A6C58; 
            transform: translateY(-2px); 
        }
        .nav-item-bottom.active span { 
            font-weight: 700; 
            color: #0A6C58; 
        }

        /* 🌟 ضبط ممتاز للهواتف الصغيرة 🌟 */
        @media (max-width: 480px) {
            .zikr-card {
                padding: 20px 12px 14px;
                border-radius: 18px;
            }
            .count-badge {
                width: 32px;
                height: 32px;
                font-size: 1rem;
                top: 10px;
                left: 10px;
            }
            .zikr-text { 
                font-size: 1.3rem; 
                line-height: 1.8; 
                margin-top: 10px;
            }
            .header-section { padding: 15px 12px; }
            .nav-item-bottom i { font-size: 1.25rem; }
            .nav-item-bottom span { font-size: 0.65rem; }
            .bottom-nav-fixed { padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0px)) !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-morning" onclick="switchTab('morning')">
                <i class="fas fa-sun"></i> أذكار الصباح
            </button>
            <button class="tab-btn" id="tab-evening" onclick="switchTab('evening')">
                <i class="fas fa-moon"></i> أذكار المساء
            </button>
        </div>
        
        <div class="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
    </div>

    <div class="zikr-list" id="zikrList">
        </div>
</div>

<div class="bottom-nav-fixed">
    <div class="nav-inner">
        <a href="index.html" class="nav-item-bottom" id="homeNavBtn">
            <i class="fas fa-home"></i><span>الرئيسية</span>
        </a>
        <a href="quran.html" class="nav-item-bottom" id="quranNavBtn">
            <i class="fas fa-book-open"></i><span>المصحف</span>
        </a>
        <a href="azkar.html" class="nav-item-bottom active" id="azkarNavBtn">
            <i class="fas fa-pray"></i><span>الأذكار</span>
        </a>
        <a href="prayer.html" class="nav-item-bottom" id="prayerNavBtn">
            <i class="fas fa-mosque"></i><span>مواقيت</span>
        </a>
        <a href="radio.html" class="nav-item-bottom" id="radioNavBtn">
            <i class="fas fa-radio"></i><span>الراديو</span>
        </a>
    </div>
</div>

<script>
    // 🌟 قاعدة بيانات الأذكار (الصباح والمساء كاملة دون أي اختصار) 🌟
    const morningAzkar = [
        { id: "m1", text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ<br><br>اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ. [آية الكرسى - البقرة 255].", count: 1, fadl: "من قالها حين يصبح أجير من الجن حتى يمسى ومن قالها حين يمسى أجير من الجن حتى يصبح." },
        { id: "m2", text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br><br>قُلْ هُوَ ٱللَّهُ أَحَدٌ، ٱللَّهُ ٱلصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ.", count: 3, fadl: "من قالها حين يصبح وحين يمسى كفته من كل شىء (الإخلاص والمعوذتين)." },
        { id: "m3", text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br><br>قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ.", count: 3, fadl: "" },
        { id: "m4", text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br><br>قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ، مَلِكِ ٱلنَّاسِ، إِلَٰهِ ٱلنَّاسِ، مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ، ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ، مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ.", count: 3, fadl: "" },
        { id: "m5", text: "أَصْـبَحْنا وَأَصْـبَحَ المُـلْكُ لله وَالحَمدُ لله ، لا إلهَ إلاّ اللّهُ وَحدَهُ لا شَريكَ لهُ، لهُ المُـلكُ ولهُ الحَمْـد، وهُوَ على كلّ شَيءٍ قدير ، رَبِّ أسْـأَلُـكَ خَـيرَ ما في هـذا اليوم وَخَـيرَ ما بَعْـدَه ، وَأَعـوذُ بِكَ مِنْ شَـرِّ ما في هـذا اليوم وَشَرِّ ما بَعْـدَه، رَبِّ أَعـوذُبِكَ مِنَ الْكَسَـلِ وَسـوءِ الْكِـبَر ، رَبِّ أَعـوذُ بِكَ مِنْ عَـذابٍ في النّـارِ وَعَـذابٍ في القَـبْر.", count: 1, fadl: "" },
        { id: "m6", text: "اللّهـمَّ أَنْتَ رَبِّـي لا إلهَ إلاّ أَنْتَ ، خَلَقْتَنـي وَأَنا عَبْـدُك ، وَأَنا عَلـى عَهْـدِكَ وَوَعْـدِكَ ما اسْتَـطَعْـت ، أَعـوذُبِكَ مِنْ شَـرِّ ما صَنَـعْت ، أَبـوءُ لَـكَ بِنِعْـمَتِـكَ عَلَـيَّ وَأَبـوءُ بِذَنْـبي فَاغْفـِرْ لي فَإِنَّـهُ لا يَغْـفِرُ الذُّنـوبَ إِلاّ أَنْتَ .", count: 1, fadl: "من قالها موقنا بها حين يمسى ومات من ليلته دخل الجنة وكذلك حين يصبح." },
        { id: "m7", text: "رَضيـتُ بِاللهِ رَبَّـاً وَبِالإسْلامِ ديـناً وَبِمُحَـمَّدٍ صلى الله عليه وسلم نَبِيّـاً.", count: 3, fadl: "من قالها حين يصبح وحين يمسى كان حقا على الله أن يرضيه يوم القيامة." },
        { id: "m8", text: "اللّهُـمَّ إِنِّـي أَصْبَـحْتُ أُشْـهِدُك ، وَأُشْـهِدُ حَمَلَـةَ عَـرْشِـك ، وَمَلَائِكَتَكَ ، وَجَمـيعَ خَلْـقِك ، أَنَّـكَ أَنْـتَ اللهُ لا إلهَ إلاّ أَنْـتَ وَحْـدَكَ لا شَريكَ لَـك ، وَأَنَّ ُ مُحَمّـداً عَبْـدُكَ وَرَسـولُـك.", count: 4, fadl: "من قالها أعتقه الله من النار." },
        { id: "m9", text: "اللّهُـمَّ ما أَصْبَـَحَ بي مِـنْ نِعْـمَةٍ أَو بِأَحَـدٍ مِـنْ خَلْـقِك ، فَمِـنْكَ وَحْـدَكَ لا شريكَ لَـك ، فَلَـكَ الْحَمْـدُ وَلَـكَ الشُّكْـر.", count: 1, fadl: "من قالها حين يصبح أدى شكر يومه." },
        { id: "m10", text: "حَسْبِـيَ اللّهُ لا إلهَ إلاّ هُوَ عَلَـيهِ تَوَكَّـلتُ وَهُوَ رَبُّ العَرْشِ العَظـيم.", count: 7, fadl: "من قالها كفاه الله ما أهمه من أمر الدنيا والأخرة." },
        { id: "m11", text: "بِسـمِ اللهِ الذي لا يَضُـرُّ مَعَ اسمِـهِ شَيءٌ في الأرْضِ وَلا في السّمـاءِ وَهـوَ السّمـيعُ العَلـيم.", count: 3, fadl: "لم يضره من الله شيء." },
        { id: "m12", text: "اللّهُـمَّ بِكَ أَصْـبَحْنا وَبِكَ أَمْسَـينا ، وَبِكَ نَحْـيا وَبِكَ نَمُـوتُ وَإِلَـيْكَ النُّـشُور.", count: 1, fadl: "" },
        { id: "m13", text: "أَصْبَـحْـنا عَلَى فِطْرَةِ الإسْلاَمِ، وَعَلَى كَلِمَةِ الإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ، وَعَلَى مِلَّةِ أَبِينَا إبْرَاهِيمَ حَنِيفاً مُسْلِماً وَمَا كَانَ مِنَ المُشْرِكِينَ.", count: 1, fadl: "" },
        { id: "m14", text: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ عَدَدَ خَلْـقِه ، وَرِضـا نَفْسِـه ، وَزِنَـةَ عَـرْشِـه ، وَمِـدادَ كَلِمـاتِـه.", count: 3, fadl: "" },
        { id: "m15", text: "اللّهُـمَّ عافِـني في بَدَنـي ، اللّهُـمَّ عافِـني في سَمْـعي ، اللّهُـمَّ عافِـني في بَصَـري ، لا إلهَ إلاّ أَنْـتَ.", count: 3, fadl: "" },
        { id: "m16", text: "اللّهُـمَّ إِنّـي أَعـوذُ بِكَ مِنَ الْكُـفر ، وَالفَـقْر ، وَأَعـوذُ بِكَ مِنْ عَذابِ القَـبْر ، لا إلهَ إلاّ أَنْـتَ.", count: 3, fadl: "" },
        { id: "m17", text: "اللّهُـمَّ إِنِّـي أسْـأَلُـكَ العَـفْوَ وَالعـافِـيةَ في الدُّنْـيا وَالآخِـرَة ، اللّهُـمَّ إِنِّـي أسْـأَلُـكَ العَـفْوَ وَالعـافِـيةَ في ديني وَدُنْـيايَ وَأهْـلي وَمالـي ، اللّهُـمَّ اسْتُـرْ عـوْراتي وَآمِـنْ رَوْعاتـي ، اللّهُـمَّ احْفَظْـني مِن بَـينِ يَدَيَّ وَمِن خَلْفـي وَعَن يَمـيني وَعَن شِمـالي ، وَمِن فَوْقـي ، وَأَعـوذُ بِعَظَمَـتِكَ أَن أُغْـتالَ مِن تَحْتـي.", count: 1, fadl: "" },
        { id: "m18", text: "يَا حَيُّ يَا قيُّومُ بِرَحْمَتِكَ أسْتَغِيثُ أصْلِحْ لِي شَأنِي كُلَّهُ وَلاَ تَكِلْنِي إلَى نَفْسِي طَـرْفَةَ عَيْنٍ.", count: 3, fadl: "" },
        { id: "m19", text: "أَصْبَـحْـنا وَأَصْبَـحْ المُـلكُ للهِ رَبِّ العـالَمـين ، اللّهُـمَّ إِنِّـي أسْـأَلُـكَ خَـيْرَ هـذا الـيَوْم ، فَـتْحَهُ ، وَنَصْـرَهُ ، وَنـورَهُ وَبَـرَكَتَـهُ ، وَهُـداهُ ، وَأَعـوذُ بِـكَ مِـنْ شَـرِّ ما فـيهِ وَشَـرِّ ما بَعْـدَه.", count: 1, fadl: "" },
        { id: "m20", text: "اللّهُـمَّ عالِـمَ الغَـيْبِ وَالشّـهادَةِ فاطِـرَ السّماواتِ وَالأرْضِ رَبَّ كـلِّ شَـيءٍ وَمَليـكَه ، أَشْهَـدُ أَنْ لا إِلـهَ إِلاّ أَنْت ، أَعـوذُ بِكَ مِن شَـرِّ نَفْسـي وَمِن شَـرِّ الشَّيْـطانِ وَشِرْكِهِ ، وَأَنْ أَقْتَـرِفَ عَلـى نَفْسـي سوءاً أَوْ أَجُـرَّهُ إِلـى مُسْـلِم.", count: 1, fadl: "" },
        { id: "m21", text: "أَعـوذُ بِكَلِمـاتِ اللّهِ التّـامّـاتِ مِنْ شَـرِّ ما خَلَـق.", count: 3, fadl: "" },
        { id: "m22", text: "اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ على نَبِيِّنَا مُحمَّد.", count: 10, fadl: "من صلى على حين يصبح وحين يمسى ادركته شفاعتى يوم القيامة." },
        { id: "m23", text: "اللَّهُمَّ إِنَّا نَعُوذُ بِكَ مِنْ أَنْ نُشْرِكَ بِكَ شَيْئًا نَعْلَمُهُ ، وَنَسْتَغْفِرُكَ لِمَا لَا نَعْلَمُهُ.", count: 3, fadl: "" },
        { id: "m24", text: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ الْهَمِّ وَالْحَزَنِ، وَأَعُوذُ بِكَ مِنْ الْعَجْزِ وَالْكَسَلِ، وَأَعُوذُ بِكَ مِنْ الْجُبْنِ وَالْبُخْلِ، وَأَعُوذُ بِكَ مِنْ غَلَبَةِ الدَّيْنِ، وَقَهْرِ الرِّجَالِ.", count: 3, fadl: "" },
        { id: "m25", text: "أسْتَغْفِرُ اللهَ العَظِيمَ الَّذِي لاَ إلَهَ إلاَّ هُوَ، الحَيُّ القَيُّومُ، وَأتُوبُ إلَيهِ.", count: 3, fadl: "" },
        { id: "m26", text: "يَا رَبِّ , لَكَ الْحَمْدُ كَمَا يَنْبَغِي لِجَلَالِ وَجْهِكَ , وَلِعَظِيمِ سُلْطَانِكَ.", count: 3, fadl: "" },
        { id: "m27", text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا، وَرِزْقًا طَيِّبًا، وَعَمَلًا مُتَقَبَّلًا.", count: 1, fadl: "" },
        { id: "m28", text: "اللَّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلا أَنْتَ ، عَلَيْكَ تَوَكَّلْتُ ، وَأَنْتَ رَبُّ الْعَرْشِ الْعَظِيمِ , مَا شَاءَ اللَّهُ كَانَ ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ ، وَلا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ , أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا , اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي ، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا ، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ.", count: 1, fadl: "ذكر طيب." },
        { id: "m29", text: "لَا إلَه إلّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءِ قَدِيرِ.", count: 100, fadl: "كانت له عدل عشر رقاب، وكتبت له مئة حسنة، ومحيت عنه مئة سيئة، وكانت له حرزا من الشيطان." },
        { id: "m30", text: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ.", count: 100, fadl: "حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ. لَمْ يَأْتِ أَحَدٌ يَوْمَ الْقِيَامَةِ بِأَفْضَلَ مِمَّا جَاءَ بِهِ إِلَّا أَحَدٌ قَالَ مِثْلَ مَا قَالَ أَوْ زَادَ عَلَيْهِ." },
        { id: "m31", text: "أسْتَغْفِرُ اللهَ وَأتُوبُ إلَيْهِ", count: 100, fadl: "مائة حسنة، ومُحيت عنه مائة سيئة، وكانت له حرزاً من الشيطان حتى يمسى." }

        { id: "e3", text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br><br>قُلْ هُوَ ٱللَّهُ أَحَدٌ، ٱللَّهُ ٱلصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ.", count: 3, fadl: "من قالها حين يصبح وحين يمسى كفته من كل شىء (الإخلاص والمعوذتين)." },
        { id: "e4", text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br><br>قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ.", count: 3, fadl: "" },
        { id: "e5", text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br><br>قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ، مَلِكِ ٱلنَّاسِ، إِلَٰهِ ٱلنَّاسِ، مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ، ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ، مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ.", count: 3, fadl: "" },
        { id: "e6", text: "أَمْسَيْـنا وَأَمْسـى المـلكُ لله وَالحَمدُ لله ، لا إلهَ إلاّ اللّهُ وَحدَهُ لا شَريكَ لهُ، لهُ المُـلكُ ولهُ الحَمْـد، وهُوَ على كلّ شَيءٍ قدير ، رَبِّ أسْـأَلُـكَ خَـيرَ ما في هـذهِ اللَّـيْلَةِ وَخَـيرَ ما بَعْـدَهـا ، وَأَعـوذُ بِكَ مِنْ شَـرِّ ما في هـذهِ اللَّـيْلةِ وَشَرِّ ما بَعْـدَهـا ، رَبِّ أَعـوذُبِكَ مِنَ الْكَسَـلِ وَسـوءِ الْكِـبَر ، رَبِّ أَعـوذُ بِكَ مِنْ عَـذابٍ في النّـارِ وَعَـذابٍ في القَـبْر.", count: 1, fadl: "" },
        { id: "e7", text: "اللّهـمَّ أَنْتَ رَبِّـي لا إلهَ إلاّ أَنْتَ ، خَلَقْتَنـي وَأَنا عَبْـدُك ، وَأَنا عَلـى عَهْـدِكَ وَوَعْـدِكَ ما اسْتَـطَعْـت ، أَعـوذُبِكَ مِنْ شَـرِّ ما صَنَـعْت ، أَبـوءُ لَـكَ بِنِعْـمَتِـكَ عَلَـيَّ وَأَبـوءُ بِذَنْـبي فَاغْفـِرْ لي فَإِنَّـهُ لا يَغْـفِرُ الذُّنـوبَ إِلاّ أَنْتَ .", count: 1, fadl: "من قالها موقنا بها حين يمسى ومات من ليلته دخل الجنة وكذلك حين يصبح." },

        { id: "e9", text: "اللّهُـمَّ إِنِّـي أَمسيتُ أُشْـهِدُك ، وَأُشْـهِدُ حَمَلَـةَ عَـرْشِـك ، وَمَلَائِكَتَكَ ، وَجَمـيعَ خَلْـقِك ، أَنَّـكَ أَنْـتَ اللهُ لا إلهَ إلاّ أَنْـتَ وَحْـدَكَ لا شَريكَ لَـك ، وَأَنَّ ُ مُحَمّـداً عَبْـدُكَ وَرَسـولُـك.", count: 4, fadl: "من قالها أعتقه الله من النار." },
        { id: "e10", text: "اللّهُـمَّ ما أَمسى بي مِـنْ نِعْـمَةٍ أَو بِأَحَـدٍ مِـنْ خَلْـقِك ، فَمِـنْكَ وَحْـدَكَ لا شريكَ لَـك ، فَلَـكَ الْحَمْـدُ وَلَـكَ الشُّكْـر.", count: 1, fadl: "من قالها حين يمسى أدى شكر يومه." },
        { id: "e11", text: "حَسْبِـيَ اللّهُ لا إلهَ إلاّ هُوَ عَلَـيهِ تَوَكَّـلتُ وَهُوَ رَبُّ العَرْشِ العَظـيم.", count: 7, fadl: "من قالها كفاه الله ما أهمه من أمر الدنيا والأخرة." },
        { id: "e12", text: "بِسـمِ اللهِ الذي لا يَضُـرُّ مَعَ اسمِـهِ شَيءٌ في الأرْضِ وَلا في السّمـاءِ وَهـوَ السّمـيعُ العَلـيم.", count: 3, fadl: "لم يضره من الله شيء." },
        { id: "e13", text: "اللّهُـمَّ بِكَ أَمْسَـينا وَبِكَ أَصْـبَحْنا، وَبِكَ نَحْـيا وَبِكَ نَمُـوتُ وَإِلَـيْكَ الْمَصِيرُ.", count: 1, fadl: "" },
        { id: "e14", text: "أَمْسَيْنَا عَلَى فِطْرَةِ الإسْلاَمِ، وَعَلَى كَلِمَةِ الإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ، وَعَلَى مِلَّةِ أَبِينَا إبْرَاهِيمَ حَنِيفاً مُسْلِماً وَمَا كَانَ مِنَ المُشْرِكِينَ.", count: 1, fadl: "" },
        { id: "e15", text: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ عَدَدَ خَلْـقِه ، وَرِضـا نَفْسِـه ، وَزِنَـةَ عَـرْشِـه ، وَمِـدادَ كَلِمـاتِـه.", count: 3, fadl: "" },
        { id: "e16", text: "اللّهُـمَّ عافِـني في بَدَنـي ، اللّهُـمَّ عافِـني في سَمْـعي ، اللّهُـمَّ عافِـني في بَصَـري ، لا إلهَ إلاّ أَنْـتَ.", count: 3, fadl: "" },
        { id: "e17", text: "اللّهُـمَّ إِنّـي أَعـوذُ بِكَ مِنَ الْكُـفر ، وَالفَـقْر ، وَأَعـوذُ بِكَ مِنْ عَذابِ القَـبْر ، لا إلهَ إلاّ أَنْـتَ.", count: 3, fadl: "" },
        { id: "e18", text: "اللّهُـمَّ إِنِّـي أسْـأَلُـكَ العَـفْوَ وَالعـافِـيةَ في الدُّنْـيا وَالآخِـرَة ، اللّهُـمَّ إِنِّـي أسْـأَلُـكَ العَـفْوَ وَالعـافِـيةَ في ديني وَدُنْـيايَ وَأهْـلي وَمالـي ، اللّهُـمَّ اسْتُـرْ عـوْراتي وَآمِـنْ رَوْعاتـي ، اللّهُـمَّ احْفَظْـني مِن بَـينِ يَدَيَّ وَمِن خَلْفـي وَعَن يَمـيني وَعَن شِمـالي ، وَمِن فَوْقـي ، وَأَعـوذُ بِعَظَمَـتِكَ أَن أُغْـتالَ مِن تَحْتـي.", count: 1, fadl: "" },
        { id: "e19", text: "يَا حَيُّ يَا قيُّومُ بِرَحْمَتِكَ أسْتَغِيثُ أصْلِحْ لِي شَأنِي كُلَّهُ وَلاَ تَكِلْنِي إلَى نَفْسِي طَـرْفَةَ عَيْنٍ.", count: 3, fadl: "" },
        { id: "e20", text: "أَمْسَيْنا وَأَمْسَى الْمُلْكُ للهِ رَبِّ الْعَالَمَيْنِ، اللَّهُمَّ إِنَّي أسْأَلُكَ خَيْرَ هَذَه اللَّيْلَةِ فَتْحَهَا ونَصْرَهَا، ونُوْرَهَا وبَرَكَتهَا، وَهُدَاهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فيهِا وَشَرَّ مَا بَعْدَهَا.", count: 1, fadl: "" },
        { id: "e21", text: "اللّهُـمَّ عالِـمَ الغَـيْبِ وَالشّـهادَةِ فاطِـرَ السّماواتِ وَالأرْضِ رَبَّ كـلِّ شَـيءٍ وَمَليـكَه ، أَشْهَـدُ أَنْ لا إِلـهَ إِلاّ أَنْت ، أَعـوذُ بِكَ مِن شَـرِّ نَفْسـي وَمِن شَـرِّ الشَّيْـطانِ وَشِرْكِهِ ، وَأَنْ أَقْتَـرِفَ عَلـى نَفْسـي سوءاً أَوْ أَجُـرَّهُ إِلـى مُسْـلِم.", count: 1, fadl: "" },
        { id: "e22", text: "أَعـوذُ بِكَلِمـاتِ اللّهِ التّـامّـاتِ مِنْ شَـرِّ ما خَلَـق.", count: 3, fadl: "" },
        { id: "e23", text: "اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ على نَبِيِّنَا مُحمَّد.", count: 10, fadl: "من صلى على حين يصبح وحين يمسى ادركته شفاعتى يوم القيامة." },
        { id: "e24", text: "اللَّهُمَّ إِنَّا نَعُوذُ بِكَ مِنْ أَنْ نُشْرِكَ بِكَ شَيْئًا نَعْلَمُهُ ، وَنَسْتَغْفِرُكَ لِمَا لَا نَعْلَمُهُ.", count: 3, fadl: "" },
        { id: "e25", text: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ الْهَمِّ وَالْحَزَنِ، وَأَعُوذُ بِكَ مِنْ الْعَجْزِ وَالْكَسَلِ، وَأَعُوذُ بِكَ مِنْ الْجُبْنِ وَالْبُخْلِ، وَأَعُوذُ بِكَ مِنْ غَلَبَةِ الدَّيْنِ، وَقَهْرِ الرِّجَالِ.", count: 3, fadl: "" },
        { id: "e26", text: "أسْتَغْفِرُ اللهَ العَظِيمَ الَّذِي لاَ إلَهَ إلاَّ هُوَ، الحَيُّ القَيُّومُ، وَأتُوبُ إلَيهِ.", count: 3, fadl: "" },
        { id: "e27", text: "يَا رَبِّ , لَكَ الْحَمْدُ كَمَا يَنْبَغِي لِجَلَالِ وَجْهِكَ , وَلِعَظِيمِ سُلْطَانِكَ.", count: 3, fadl: "" },
        { id: "e28", text: "لَا إلَه إلّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءِ قَدِيرِ.", count: 100, fadl: "كانت له عدل عشر رقاب، وكتبت له مئة حسنة، ومحيت عنه مئة سيئة، وكانت له حرزا من الشيطان." },
        { id: "e29", text: "اللَّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلا أَنْتَ ، عَلَيْكَ تَوَكَّلْتُ ، وَأَنْتَ رَبُّ الْعَرْشِ الْعَظِيمِ , مَا شَاءَ اللَّهُ كَانَ ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ ، وَلا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ , أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا , اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي ، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا ، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ.", count: 1, fadl: "ذكر طيب." },
        { id: "e30", text: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ.", count: 100, fadl: "حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ. لَمْ يَأْتِ أَحَدٌ يَوْمَ الْقِيَامَةِ بِأَفْضَلَ مِمَّا جَاءَ بِهِ إِلَّا أَحَدٌ قَالَ مِثْلَ مَا قَالَ أَوْ زَادَ عَلَيْهِ." }
    ];

    let currentTab = 'morning';
    let currentData = [];
    let state = {};

    function toArabicNum(num) {
        const arabicDigits = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
        return num.toString().split('').map(d => arabicDigits[d] || d).join('');
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-morning').classList.toggle('active', tab === 'morning');
        document.getElementById('tab-evening').classList.toggle('active', tab === 'evening');
        
        currentData = JSON.parse(JSON.stringify(tab === 'morning' ? morningAzkar : eveningAzkar));
        
        state = {};
        currentData.forEach(z => { state[z.id] = z.count; });
        
        renderAzkar();
        updateProgress();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderAzkar() {
        const list = document.getElementById('zikrList');
        list.innerHTML = '';

        currentData.forEach(zikr => {
            const currentCount = state[zikr.id];
            const isDone = currentCount === 0;
            
            const fadlHtml = zikr.fadl ? `<div class="zikr-fadl has-content">${zikr.fadl}</div>` : `<div class="zikr-fadl"></div>`;
            
            // العداد الأنيق في الزاوية
            const badgeHtml = isDone 
                ? `<div class="count-badge done" id="badge-${zikr.id}"><i class="fas fa-check"></i></div>`
                : `<div class="count-badge" id="badge-${zikr.id}">${toArabicNum(currentCount)}</div>`;

            const card = document.createElement('div');
            card.className = `zikr-card ${isDone ? 'completed' : ''}`;
            card.id = `card-${zikr.id}`;
            
            // إضافة خاصية اللمس للبطاقة بالكامل
            card.onclick = () => {
                if(state[zikr.id] > 0) decreaseCount(zikr.id);
            };

            card.innerHTML = `
                ${badgeHtml}
                <div class="zikr-text">${zikr.text}</div>
                ${fadlHtml}
            `;
            list.appendChild(card);
        });
    }

    function decreaseCount(id) {
        if (state[id] > 0) {
            state[id]--;
            
            // اهتزاز خفيف للموبايل (سبحة إلكترونية)
            if (navigator.vibrate) navigator.vibrate(40);
            
            const currentCount = state[id];
            const card = document.getElementById(`card-${id}`);
            const badge = document.getElementById(`badge-${id}`);

            if (currentCount === 0) {
                badge.classList.add('done');
                badge.innerHTML = `<i class="fas fa-check"></i>`;
                card.classList.add('completed');
                
                if (navigator.vibrate) navigator.vibrate([30, 50, 30]); // اهتزاز الاكتمال
            } else {
                badge.innerText = toArabicNum(currentCount);
                // حركة (Pop) سريعة للعداد
                badge.classList.remove('pop');
                void badge.offsetWidth; // Trigger reflow
                badge.classList.add('pop');
            }
            updateProgress();
        }
    }

    function updateProgress() {
        const totalItems = currentData.length;
        let completedItems = 0;
        
        currentData.forEach(z => {
            if (state[z.id] === 0) completedItems++;
        });

        const percentage = totalItems === 0 ? 0 : Math.round((completedItems / totalItems) * 100);
        
        document.getElementById('progressFill').style.width = `${percentage}%`;
        document.getElementById('progressText').innerText = `${percentage}%`;
    }

    window.addEventListener('load', () => {
        switchTab('morning');
    });
</script>
