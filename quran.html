<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>القرآن الكريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Amiri+Quran&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    
    /* منع تحديد (تظليل) النصوص في جميع المتصفحات */
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    
    /* منع وميض الأزرار عند الضغط في الهواتف */
    -webkit-tap-highlight-color: transparent;
    
    /* منع التكبير بالنقر المزدوج السريع */
    touch-action: manipulation;
}

/* ⚠️ مهم جداً: السماح بالكتابة والتظليل داخل مربع البحث فقط ⚠️ */
input, textarea {
    -webkit-user-select: auto;
    -moz-user-select: auto;
    -ms-user-select: auto;
    user-select: auto;
}

body {
            font-family: 'Cairo', sans-serif;
            background: #FAF9F6;
            color: #2D5A4C;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            /* تحديث المسافة السفلية لدعم الهواتف الحديثة */
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.04"><path fill="none" stroke="%232D5A4C" stroke-width="1.5" d="M400 50 L450 150 L550 150 L475 225 L500 325 L400 275 L300 325 L325 225 L250 150 L350 150 Z M400 50 L400 275 M475 225 L325 225 M500 325 L300 325 M450 150 L350 150"/><circle cx="400" cy="400" r="80" stroke="%232D5A4C" fill="none"/><circle cx="400" cy="400" r="120" stroke="%232D5A4C" fill="none" stroke-dasharray="5 5"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 350px;
            height: 350px;
            background: rgba(45, 90, 76, 0.2);
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            bottom: -100px;
            left: -100px;
            animation: floatGlow 10s infinite alternate;
        }
        .bg-glow.right {
            top: -80px;
            right: -80px;
            left: auto;
            bottom: auto;
            background: rgba(212, 175, 55, 0.15);
            animation-delay: -5s;
        }
        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(30px, 30px) scale(1.2); opacity: 0.8; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px 18px 40px;
            position: relative;
            z-index: 5;
        }

        .quran-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(45, 90, 76, 0.25);
            padding: 20px 24px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08);
        }
        .quran-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #2D5A4C;
            margin-bottom: 12px;
        }
        .search-box {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 40px;
            border: 1px solid rgba(45, 90, 76, 0.3);
            background: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: #2D5A4C;
            outline: none;
            transition: all 0.2s;
        }
        .search-box input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(45, 90, 76, 0.6);
        }

        #loader {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            margin: 50px auto;
        }
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(45, 90, 76, 0.2);
            border-top: 4px solid #2D5A4C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .surah-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(45, 90, 76, 0.2);
            padding: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.05);
        }
        .surah-card:hover {
            transform: translateY(-4px);
            border-color: #d4af37;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 15px 25px -12px rgba(45, 90, 76, 0.2);
        }
        .surah-info h2 {
            font-family: 'Amiri Quran', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #2D5A4C;
            margin-bottom: 6px;
        }
        .surah-meta {
            font-size: 0.8rem;
            color: rgba(45, 90, 76, 0.7);
            font-weight: 500;
        }
        .surah-number {
            width: 48px;
            height: 48px;
            background: #E9F3F0;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #2D5A4C;
            border: 1px solid rgba(45, 90, 76, 0.2);
        }

        .quran-viewer {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid rgba(45, 90, 76, 0.25);
            padding: 30px 25px;
            margin-bottom: 30px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid rgba(45, 90, 76, 0.2);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .surah-title {
            font-family: 'Amiri Quran', serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #2D5A4C;
            text-align: center;
            flex-grow: 1;
        }
        
        /* أدوات التحكم العلوية في العارض */
        .controls-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #E9F3F0;
            border: 1px solid rgba(45, 90, 76, 0.3);
            border-radius: 30px;
            padding: 8px 16px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            color: #2D5A4C;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn:hover {
            background: #d4af37;
            color: white;
            border-color: #d4af37;
        }
        .stop-audio-btn {
            background: #647d89;
            color: white;
            border-color: #647d89;
            display: none; /* يظهر فقط عند التشغيل */
        }
        .stop-audio-btn:hover {
            background: #a5281b;
            border-color: #a5281b;
        }

        .bismillah {
            text-align: center;
            font-family: 'Amiri Quran', serif;
            font-size: 2rem;
            margin: 20px 0 30px;
            color: #2D5A4C;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        /* منطقة نص الآيات */
        .quran-text {
            font-family: 'Amiri Quran', 'Amiri', serif;
            font-size: 1.45rem; /* الخط الافتراضي */
            line-height: 2.4;
            text-align: justify;
            color: #1e3a2f;
            transition: font-size 0.3s ease;
        }
        .playable-ayah {
            display: inline;
            cursor: pointer;
            border-radius: 8px;
            padding: 2px 4px;
            transition: background 0.3s, color 0.3s;
        }
        .playable-ayah:hover {
            background: rgba(45, 90, 76, 0.08);
        }
        /* تصميم الآية قيد التلاوة */
        .playing-ayah {
            background: rgba(212, 175, 55, 0.15);
            color: #b58500;
            font-weight: bold;
        }
        .ayah-number {
            display: inline-block;
            margin: 0 5px;
            font-size: 0.8em;
            color: #d4af37;
            font-weight: bold;
            background: rgba(212, 175, 55, 0.08);
            border-radius: 20px;
            padding: 0 4px;
            user-select: none;
        }

/* ========== الشريط السفلي الثابت ========== */
        .bottom-nav-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0; /* لضمان التمدد الكامل */
            width: 100%;
            background: rgba(250, 249, 242, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(45, 90, 76, 0.2);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
            z-index: 9999; /* رفع القيمة لأقصى حد */
            /* دمج المسافة الآمنة للهواتف الحديثة */
            padding: 6px 12px calc(8px + env(safe-area-inset-bottom)); 
            transition: all 0.2s ease;
            /* منع اهتزاز الشريط أثناء تمرير الآيات */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .nav-inner {
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .nav-item-bottom {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            color: #2D5A4C;
            background: transparent;
            border-radius: 28px;
            padding: 6px 0 5px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
        }

        .nav-item-bottom i {
            font-size: 1.35rem;
            color: #2D5A4C;
            transition: transform 0.2s;
        }

        .nav-item-bottom span {
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: -0.2px;
            opacity: 0.85;
        }

        .nav-item-bottom:hover {
            background: rgba(45, 90, 76, 0.08);
            transform: translateY(-2px);
        }

        .nav-item-bottom.active i,
        .nav-item-bottom.active span {
            color: #c6a43b;
            font-weight: 800;
        }

@media (max-width: 640px) {
            .container { padding: 55px 15px 15px; }
            .surah-grid { grid-template-columns: 1fr; }
            .surah-title { font-size: 1.4rem; order: -1; width: 100%; margin-bottom: 10px; }
            .controls-group { justify-content: center; width: 100%; }
            .bismillah { font-size: 1.5rem; }
            .nav-item-bottom i { font-size: 1.2rem; }
            .nav-item-bottom span { font-size: 0.65rem; }
            /* تحديث المسافة السفلية للشريط في الموبايل */
            .bottom-nav-fixed { padding: 5px 10px calc(6px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow right"></div>

<div class="container">
    <div class="quran-header">
        <h1>القرآن الكريم</h1>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن سورة أو آية...">
        </div>
    </div>

    <div id="loader" style="display: flex; flex-direction: column; align-items: center;">
        <div class="loader-spinner"></div>
        <div style="color:#2D5A4C; font-weight: 600;">نحمّل آيات الذكر الحكيم...</div>
    </div>

    <div id="surahGrid" class="surah-grid" style="display: none;"></div>

    <div id="quranViewer" class="quran-viewer">
        <div class="viewer-header">
            <button class="action-btn" id="closeViewerBtn"><i class="fas fa-arrow-right"></i> القائمة</button>
            <div class="surah-title" id="viewerSurahTitle"></div>
            
            <div class="controls-group">
                <button class="action-btn" onclick="changeFontSize(0.1)" title="تكبير الخط"><i class="fas fa-search-plus"></i></button>
                <button class="action-btn" onclick="changeFontSize(-0.1)" title="تصغير الخط"><i class="fas fa-search-minus"></i></button>
                <button class="action-btn stop-audio-btn" id="stopAudioBtn" onclick="stopAudio()"><i class="fas fa-stop-circle"></i> إيقاف</button>
            </div>
        </div>
        <div id="bismillahContainer" class="bismillah"></div>
        <div id="ayahsContainer" class="quran-text"></div>
    </div>
</div>

<div class="bottom-nav-fixed">
    <div class="nav-inner">
        <a href="index.html" class="nav-item-bottom" id="homeNavBtn">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="quran.html" class="nav-item-bottom active" id="quranNavBtn">
            <i class="fas fa-book-open"></i>
            <span>المصحف</span>
        </a>
        <a href="prayer.html" class="nav-item-bottom" id="prayerNavBtn">
            <i class="fas fa-mosque"></i>
            <span>مواقيت</span>
        </a>
        <a href="radio.html" class="nav-item-bottom" id="radioNavBtn">
            <i class="fas fa-radio"></i>
            <span>الراديو</span>
        </a>
    </div>
</div>

<script>
    const QURAN_API = 'https://api.alquran.cloud/v1/quran/quran-uthmani';
    
    let fullQuranData = [];
    let currentFontSize = 1.45; // الحجم الافتراضي للخط
    
    // إعدادات الصوت
    let audioPlayer = new Audio();
    let isAutoPlay = false;
    let currentGlobalAyahNumber = null;
    let currentSurahAyahsList = []; // مصفوفة تحمل الأرقام العالمية للآيات في السورة الحالية المعروضة

    function toArabicNum(num) {
        const arabicDigits = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
        return num.toString().split('').map(d => arabicDigits[d] || d).join('');
    }

    function normalizeArabic(str) {
        return str.replace(/[\u0617-\u061A\u064B-\u0652]/g, '')
                  .replace(/[أإآ]/g, 'ا')
                  .replace(/ة/g, 'ه')
                  .replace(/ى/g, 'ي');
    }

    // التحكم بحجم الخط
    function changeFontSize(step) {
        currentFontSize += step;
        if(currentFontSize < 1) currentFontSize = 1;
        if(currentFontSize > 3.5) currentFontSize = 3.5;
        document.getElementById('ayahsContainer').style.fontSize = currentFontSize + 'rem';
    }

    function renderSurahs(surahs) {
        const grid = document.getElementById('surahGrid');
        grid.innerHTML = '';
        surahs.forEach(surah => {
            const type = surah.revelationType === 'Meccan' ? 'مكية' : 'مدنية';
            const ayahCount = toArabicNum(surah.ayahs.length);
            const card = document.createElement('div');
            card.className = 'surah-card';
            card.onclick = () => openSurah(surah);
            card.innerHTML = `
                <div class="surah-info">
                    <h2>سورة ${surah.name.replace('سُورَةُ ', '')}</h2>
                    <div class="surah-meta">
                        <span>${type}</span> • <span>${ayahCount} آية</span>
                    </div>
                </div>
                <div class="surah-number">${toArabicNum(surah.number)}</div>
            `;
            grid.appendChild(card);
        });
        document.getElementById('surahGrid').style.display = 'grid';
        document.getElementById('loader').style.display = 'none';
    }

    function openSurah(surah) {
        // إيقاف أي صوت شغال قبل فتح سورة جديدة
        stopAudio();
        
        document.getElementById('surahGrid').style.display = 'none';
        document.getElementById('quranViewer').style.display = 'block';
        document.getElementById('viewerSurahTitle').innerText = `سورة ${surah.name.replace('سُورَةُ ', '')}`;

        const bismillahDiv = document.getElementById('bismillahContainer');
        const ayahsDiv = document.getElementById('ayahsContainer');
        ayahsDiv.innerHTML = '';

        const surahNum = surah.number;
        const isFatiha = (surahNum === 1);
        const isTawbah = (surahNum === 9);

        // البسملة الثابتة بالتشكيل التام للخط
        const bismillahText = 'بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ';

        if (isTawbah || isFatiha) {
            bismillahDiv.style.display = 'none';
        } else {
            bismillahDiv.style.display = 'block';
            bismillahDiv.innerText = bismillahText;
        }

        let ayahsArray = surah.ayahs;
        let html = '';
        currentSurahAyahsList = [];

        for (let i = 0; i < ayahsArray.length; i++) {
            const ayah = ayahsArray[i];
            let ayahText = ayah.text;
            
            // حفظ الرقم العالمي للآية لاستخدامه في الصوت
            currentSurahAyahsList.push(ayah.number);

            // إزالة البسملة المكررة برمجياً من أول آية (باستثناء الفاتحة والتوبة)
            if (i === 0 && !isFatiha && !isTawbah) {
                // الكود العثماني للبسملة المدمجة كما يأتي من الـ API
                const bismillahPrefix = "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ "; 
                if (ayahText.startsWith(bismillahPrefix)) {
                    ayahText = ayahText.replace(bismillahPrefix, '');
                } else if (ayahText.includes("ٱلرَّحِيمِ")) {
                    // معالجة احتياطية في حال اختلف التشكيل قليلاً
                    ayahText = ayahText.replace(/^.*?ٱلرَّحِيمِ\s*/, '');
                }
            }

            // تضمين الآية داخل Span قابل للضغط لتشغيل الصوت
            html += `<span class="playable-ayah" id="ayah-${ayah.number}" onclick="playAyah(${ayah.number})">${ayahText}</span> <span class="ayah-number">﴿${toArabicNum(ayah.numberInSurah)}﴾</span> `;
        }
        
        ayahsDiv.innerHTML = html;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // دالة تشغيل التلاوة
    function playAyah(globalNum) {
        currentGlobalAyahNumber = globalNum;
        isAutoPlay = true;

        // إزالة التظليل عن جميع الآيات وتظليل الآية الحالية
        document.querySelectorAll('.playable-ayah').forEach(el => el.classList.remove('playing-ayah'));
        const currentSpan = document.getElementById(`ayah-${globalNum}`);
        if(currentSpan) {
            currentSpan.classList.add('playing-ayah');
            // عمل تمرير ناعم لتكون الآية في منتصف الشاشة
            currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // رابط الصوت للشيخ مشاري العفاسي من الخادم الموثوق
        audioPlayer.src = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${globalNum}.mp3`;
        audioPlayer.play().catch(e => console.log('خطأ في تشغيل الصوت:', e));

        document.getElementById('stopAudioBtn').style.display = 'inline-flex';
    }

    // الانتقال التلقائي للآية التالية عند انتهاء الآية الحالية
    audioPlayer.onended = () => {
        if (isAutoPlay) {
            let currentIndex = currentSurahAyahsList.indexOf(currentGlobalAyahNumber);
            // إذا كان هناك آية تالية في نفس السورة
            if (currentIndex !== -1 && currentIndex < currentSurahAyahsList.length - 1) {
                playAyah(currentSurahAyahsList[currentIndex + 1]);
            } else {
                // انتهت السورة
                stopAudio(); 
            }
        }
    };

    // إيقاف الصوت
    function stopAudio() {
        audioPlayer.pause();
        audioPlayer.currentTime = 0;
        isAutoPlay = false;
        currentGlobalAyahNumber = null;
        
        document.querySelectorAll('.playable-ayah').forEach(el => el.classList.remove('playing-ayah'));
        document.getElementById('stopAudioBtn').style.display = 'none';
    }

    function closeViewer() {
        stopAudio(); // إيقاف الصوت عند الخروج من السورة
        document.getElementById('quranViewer').style.display = 'none';
        document.getElementById('surahGrid').style.display = 'grid';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterSurahs(searchTerm) {
        if (!searchTerm.trim()) {
            renderSurahs(fullQuranData);
            return;
        }
        const normalizedTerm = normalizeArabic(searchTerm.trim());
        const filtered = fullQuranData.filter(surah => {
            if (normalizeArabic(surah.name).includes(normalizedTerm)) return true;
            return surah.ayahs.some(ayah => normalizeArabic(ayah.text).includes(normalizedTerm));
        });
        renderSurahs(filtered);
    }

    async function loadQuran() {
        try {
            const response = await fetch(QURAN_API);
            const data = await response.json();
            if (data.code !== 200) throw new Error('فشل تحميل البيانات');
            fullQuranData = data.data.surahs;
            renderSurahs(fullQuranData);
        } catch (error) {
            console.error(error);
            document.getElementById('loader').innerHTML = `
                <div style="background:white; border-radius: 28px; padding:20px; text-align:center;">
                    <i class="fas fa-exclamation-triangle" style="font-size:2rem; color:#c0392b;"></i>
                    <p style="margin-top:10px;">حدث خطأ في تحميل القرآن الكريم</p>
                    <button onclick="location.reload()" style="background:#2D5A4C; border:none; padding:8px 20px; border-radius:30px; color:white; margin-top:12px;">إعادة المحاولة</button>
                </div>
            `;
        }
    }

    function initSearch() {
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            filterSurahs(e.target.value);
        });
    }

    function init() {
        loadQuran();
        initSearch();
        document.getElementById('closeViewerBtn').addEventListener('click', closeViewer);
        document.getElementById('quranViewer').style.display = 'none';
        // تعيين حجم الخط الأولي
        document.getElementById('ayahsContainer').style.fontSize = currentFontSize + 'rem';
    }

    window.addEventListener('load', init);
</script>
</body>
</html>
