<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الراديو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Amiri+Quran&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    
    /* منع تحديد (تظليل) النصوص */
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    
    /* منع ظهور المربع الرمادي عند الضغط على الأزرار (مثل زر التشغيل) */
    -webkit-tap-highlight-color: transparent;
    
    /* منع التكبير بالنقر المزدوج السريع */
    touch-action: manipulation;
}

/* احتياطياً: السماح بالكتابة إذا قررت إضافة أي حقول بحث مستقبلاً */
input, textarea {
    -webkit-user-select: auto;
    -moz-user-select: auto;
    -ms-user-select: auto;
    user-select: auto;
}

body {
            font-family: 'Cairo', sans-serif;
            background: #FAF9F6;
            min-height: 100vh;
            color: #2D5A4C;
            position: relative;
            overflow-x: hidden;
            /* تحديث المسافة السفلية لدعم الهواتف الحديثة */
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
        }

        /* خلفية مزخرفة أنيقة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.04"><path fill="none" stroke="%232D5A4C" stroke-width="1.5" d="M400 50 L450 150 L550 150 L475 225 L500 325 L400 275 L300 325 L325 225 L250 150 L350 150 Z M400 50 L400 275 M475 225 L325 225 M500 325 L300 325 M450 150 L350 150"/><circle cx="400" cy="400" r="80" stroke="%232D5A4C" fill="none"/><circle cx="400" cy="400" r="120" stroke="%232D5A4C" fill="none" stroke-dasharray="5 5"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        /* ظلال ضوئية عصرية */
        .bg-glow {
            position: fixed;
            width: 350px;
            height: 350px;
            background: rgba(45, 90, 76, 0.2);
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            bottom: -100px;
            left: -100px;
            animation: floatGlow 10s infinite alternate;
        }
        .bg-glow.right {
            top: -80px;
            right: -80px;
            left: auto;
            bottom: auto;
            background: rgba(212, 175, 55, 0.15);
            animation-delay: -5s;
        }
        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(30px, 30px) scale(1.2); opacity: 0.8; }
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 18px; 
            min-height: calc(100vh - 80px); /* دي التريكة اللي هتخلي الكارت يتوسط الشاشة */
            display: flex;
            align-items: center; /* توسيط عمودي */
            position: relative;
            z-index: 5;
            animation: fadeSlideUp 0.6s ease-out;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* بطاقة زجاجية أنيقة */
        .glass-card {
            width: 100%; /* عشان ياخد العرض بالكامل */
            margin-bottom: 0; /* لغينا الهامش السفلي نهائياً */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(45, 90, 76, 0.25);
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08);
            padding: 28px 24px;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s;
        }

        .glass-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(45, 90, 76, 0.2);
        }

        /* أيقونة الهلال المتطورة */
        .icon-wrapper {
            width: 110px;
            height: 110px;
            background: #E9F3F0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            font-size: 52px;
            color: #2D5A4C;
            border: 1px solid rgba(45, 90, 76, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .glass-card:hover .icon-wrapper {
            transform: scale(1.02);
            border-color: #d4af37;
        }

        h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            color: #2D5A4C;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(45, 90, 76, 0.7);
            font-weight: 500;
            margin-bottom: 25px;
        }

        /* متحرك الموجات الصوتية */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 6px;
            height: 45px;
            margin-bottom: 30px;
        }

        .bar {
            width: 5px;
            background: #2D5A4C;
            border-radius: 4px;
            height: 8px;
            transition: height 0.1s ease;
        }

        .playing .bar {
            animation: soundBounce 1s infinite alternate ease-in-out;
        }

        .bar:nth-child(1) { animation-delay: 0.1s; }
        .bar:nth-child(2) { animation-delay: 0.4s; }
        .bar:nth-child(3) { animation-delay: 0.2s; }
        .bar:nth-child(4) { animation-delay: 0.5s; }
        .bar:nth-child(5) { animation-delay: 0.3s; }
        .bar:nth-child(6) { animation-delay: 0.6s; }
        .bar:nth-child(7) { animation-delay: 0.15s; }

        @keyframes soundBounce {
            0% { height: 8px; }
            100% { height: 32px; }
        }

        /* زر التشغيل الأنيق */
        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .play-btn {
            background: #2D5A4C;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 10px 20px rgba(45, 90, 76, 0.3);
            color: white;
            font-size: 30px;
        }

        .play-btn:hover {
            transform: scale(1.08);
            background: #397160;
            box-shadow: 0 15px 28px rgba(45, 90, 76, 0.4);
        }

        .play-btn:active {
            transform: scale(0.96);
        }

        /* دعاء ختامي */
        .footer-message {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(45, 90, 76, 0.6);
            font-weight: 500;
        }

/* ========== الشريط السفلي الثابت (رئيسية - قرآن - صلاة - راجح) ========== */
        .bottom-nav-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0; /* لضمان التمدد الكامل */
            width: 100%;
            background: rgba(250, 249, 242, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(45, 90, 76, 0.2);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
            z-index: 9999; /* رفع القيمة لأقصى حد */
            /* دمج المسافة الآمنة للهواتف الحديثة */
            padding: 6px 12px calc(8px + env(safe-area-inset-bottom)); 
            transition: all 0.2s ease;
            /* إجبار المتصفح على تسريع العتاد لمنع اهتزاز الشريط */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .nav-inner {
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .nav-item-bottom {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            color: #2D5A4C;
            background: transparent;
            border-radius: 28px;
            padding: 6px 0 5px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
        }

        .nav-item-bottom i {
            font-size: 1.35rem;
            color: #2D5A4C;
            transition: transform 0.2s;
        }

        .nav-item-bottom span {
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: -0.2px;
            opacity: 0.85;
        }

        .nav-item-bottom:hover {
            background: rgba(45, 90, 76, 0.08);
            transform: translateY(-2px);
        }

        .nav-item-bottom:active {
            transform: scale(0.96);
        }

        .nav-item-bottom.active i,
        .nav-item-bottom.active span {
            color: #c6a43b;
            font-weight: 800;
        }

@media (max-width: 480px) {
            .container { 
                padding: 15px; 
                /* الحفاظ على التوسيط مع حساب مسافة الشريط الجديدة */
                min-height: calc(100vh - (70px + env(safe-area-inset-bottom))); 
            }
            .glass-card { padding: 20px; }
            .icon-wrapper { width: 80px; height: 80px; font-size: 38px; }
            h1 { font-size: 1.5rem; }
            .play-btn { width: 65px; height: 65px; font-size: 26px; }
            .visualizer { gap: 4px; height: 35px; }
            .bar { width: 4px; }
            .nav-item-bottom i { font-size: 1.2rem; }
            .nav-item-bottom span { font-size: 0.65rem; }
            /* تحديث المسافة السفلية للشريط في الموبايل */
            .bottom-nav-fixed { padding: 5px 10px calc(6px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow right"></div>

<div class="container">
    <div class="glass-card" id="playerCard">
        <div class="icon-wrapper">
            <i class="fas fa-radio"></i>
        </div>
        <h1>الراديو</h1>
        <div class="subtitle">إذاعة القرآن الكريم – بث مباشر</div>

        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <audio id="audioPlayer" preload="none">
            <source src="https://n07.radiojar.com/8s5u5tpdtwzuv" type="audio/mpeg">
            متصفحك لا يدعم تشغيل الملفات الصوتية.
        </audio>

        <div class="controls">
            <button class="play-btn" id="playPauseBtn">
                <i class="fas fa-play" id="playIcon"></i>
            </button>
        </div>
    </div>
</div>

<div class="bottom-nav-fixed">
    <div class="nav-inner">
        <a href="index.html" class="nav-item-bottom" id="homeNavBtn">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="quran.html" class="nav-item-bottom" id="quranNavBtn">
            <i class="fas fa-book-open"></i>
            <span>المصحف</span>
        </a>
        <a href="prayer.html" class="nav-item-bottom" id="prayerNavBtn">
            <i class="fas fa-mosque"></i>
            <span>مواقيت</span>
        </a>
        <a href="radio.html" class="nav-item-bottom active" id="radioNavBtn">
            <i class="fas fa-radio"></i>
            <span>الراديو</span>
        </a>
    </div>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const playerCard = document.getElementById('playerCard');

    let isPlaying = false;

    // تعيين مستوى الصوت الافتراضي (الحد الأقصى)
    audio.volume = 1;

    // تشغيل/إيقاف
    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play');
            playerCard.classList.remove('playing');
        } else {
            audio.load();
            audio.play().then(() => {
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
                playerCard.classList.add('playing');
                isPlaying = true;
            }).catch((err) => {
                console.warn("Auto-play prevented or stream error:", err);
                alert("تعذر تشغيل البث المباشر. قد يكون المتصفح منع التشغيل التلقائي. يرجى النقر مرة أخرى.");
            });
        }
    }

    playBtn.addEventListener('click', () => {
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play');
            playerCard.classList.remove('playing');
        } else {
            audio.load();
            audio.play().then(() => {
                isPlaying = true;
                playIcon.classList.remove('fa-play');
                playIcon.classList.add('fa-pause');
                playerCard.classList.add('playing');
            }).catch((err) => {
                console.error("Playback failed:", err);
                alert("لا يمكن تشغيل البث حالياً. تحقق من اتصالك بالإنترنت وحاول مجدداً.");
                isPlaying = false;
            });
        }
    });

    // في حال انتهى البث لأي سبب
    audio.addEventListener('ended', () => {
        if (isPlaying) {
            // حاول إعادة التشغيل إذا انقطع
            audio.load();
            audio.play().catch(() => {});
        }
    });

    // إظهار رسالة عند الخطأ
    audio.addEventListener('error', (e) => {
        console.error("Audio error", e);
        if (isPlaying) {
            alert("حدث انقطاع في البث المباشر. سيتم إعادة المحاولة تلقائياً.");
            setTimeout(() => {
                audio.load();
                audio.play().catch(() => {});
            }, 2000);
        }
    });
</script>
</body>
</html>
