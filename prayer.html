<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مواقيت الصلاة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    
    /* منع تحديد (تظليل) النصوص في جميع المتصفحات */
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    
    /* منع ظهور المربع الرمادي/الأزرق عند الضغط على الأزرار في الهواتف */
    -webkit-tap-highlight-color: transparent;
    
    /* منع التكبير بالنقر المزدوج السريع */
    touch-action: manipulation;
}

/* السماح بالكتابة في حال إضافة حقول إدخال مستقبلاً */
input, textarea {
    -webkit-user-select: auto;
    -moz-user-select: auto;
    -ms-user-select: auto;
    user-select: auto;
}

body {
            font-family: 'Cairo', sans-serif;
            background: #FAF9F6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            /* تمت إضافة env لدعم الشاشات الحديثة */
            padding-bottom: calc(80px + env(safe-area-inset-bottom)); 
            position: relative;
            overflow-x: hidden;
            color: #2D5A4C;
        }

        /* زخرفة خلفية خفيفة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" opacity="0.05"><path fill="none" stroke="%232D5A4C" stroke-width="1.5" d="M400 50 L450 150 L550 150 L475 225 L500 325 L400 275 L300 325 L325 225 L250 150 L350 150 Z M400 50 L400 275 M475 225 L325 225 M500 325 L300 325 M450 150 L350 150"/><circle cx="400" cy="400" r="80" stroke="%232D5A4C" fill="none"/><circle cx="400" cy="400" r="120" stroke="%232D5A4C" fill="none" stroke-dasharray="5 5"/></svg>');
            background-repeat: repeat;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

/* الشريط العلوي */
.luxury-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px);
    border-radius: 40px;
    padding: 10px 20px;
    margin-bottom: 20px;
    margin-top: 30px; /* 👈 السطر الجديد لعمل مساحة حرة فوق المستطيل */
    border: 1px solid rgba(45, 90, 76, 0.2);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

        .location-status {
            font-size: 0.9rem;
            color: #2D5A4C;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .location-status i {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 8px rgba(45, 90, 76, 0.6); }
            100% { opacity: 0.6; }
        }

        .current-time-lux {
            background: #E9F3F0;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #2D5A4C;
            direction: ltr;
            font-family: monospace;
            letter-spacing: 1px;
            border: 1px solid rgba(45, 90, 76, 0.3);
        }

        /* البطاقة الرئيسية - المدمجة والاحترافية */
        .main-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(45, 90, 76, 0.3);
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .gold-glow {
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(45, 90, 76, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* صف التواريخ */
        .date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(45, 90, 76, 0.15);
            padding-bottom: 12px;
        }

        .date-badge {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hijri-badge {
            background: #E9F3F0;
            color: #2D5A4C;
            border: 1px solid rgba(45, 90, 76, 0.3);
        }

        .gregorian-badge {
            background: rgba(45, 90, 76, 0.05);
            color: #2D5A4C;
        }

        /* منطقة الصلاة القادمة والعد التنازلي */
        .prayer-focus {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-prayer-info {
            display: flex;
            flex-direction: column;
        }

        .next-prayer-label {
            font-size: 0.75rem;
            color: rgba(45, 90, 76, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .next-prayer-name {
            font-size: 1.4rem;
            font-weight: 900;
            color: #2D5A4C;
            text-shadow: 0 2px 10px rgba(45, 90, 76, 0.15);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .next-prayer-name i {
            color: #2D5A4C;
            font-size: 1.5rem;
        }

        .countdown-container {
            text-align: left;
            background: #E9F3F0;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(45, 90, 76, 0.2);
        }

        .countdown {
            font-size: 1.2rem;
            font-weight: 800;
            font-family: monospace;
            color: #2D5A4C;
            letter-spacing: 2px;
            direction: ltr;
        }

        .countdown-label {
            font-size: 0.65rem;
            color: rgba(45, 90, 76, 0.8);
            text-align: center;
            margin-top: 2px;
        }

        /* قائمة الصلوات */
        .prayers-list {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 10px;
            border: 1px solid rgba(45, 90, 76, 0.15);
        }

        .prayer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            margin-bottom: 6px;
            border-radius: 20px;
            background: transparent;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .prayer-item:last-child {
            margin-bottom: 0;
        }

        .prayer-item.active {
            background: #E9F3F0;
            border-right: 3px solid #2D5A4C;
            border-left: 1px solid rgba(45, 90, 76, 0.2);
        }

        .prayer-name-group {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2D5A4C;
        }

        .prayer-icon {
            color: rgba(45, 90, 76, 0.5);
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }

        .prayer-item.active .prayer-icon {
            color: #2D5A4C;
            text-shadow: 0 0 8px rgba(45, 90, 76, 0.4);
        }

        .prayer-time {
            font-weight: 700;
            font-size: 1rem;
            font-family: monospace;
            color: #2D5A4C;
            letter-spacing: 0.5px;
        }

        /* تذييل دعائي */
        .footer-dua {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(45, 90, 76, 0.7);
        }

        /* شاشة التحميل */
        #loading {
            text-align: center;
            background: rgba(250, 249, 246, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            width: 280px;
            margin: auto;
            border: 1px solid rgba(45, 90, 76, 0.3);
        }

        .premium-spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(45, 90, 76, 0.1);
            border-top: 3px solid #2D5A4C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

/* ========== الشريط السفلي الثابت (رئيسية - قرآن - صلاة - راجح) ========== */
        .bottom-nav-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0; /* لضمان التمدد الكامل */
            width: 100%;
            background: rgba(250, 249, 242, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(45, 90, 76, 0.2);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
            z-index: 9999; /* رفع القيمة لأقصى حد ليبقى فوق كل شيء */
            /* دمج المسافة الآمنة للهواتف الحديثة */
            padding: 6px 12px calc(8px + env(safe-area-inset-bottom)); 
            transition: all 0.2s ease;
            /* إجبار المتصفح على تسريع العتاد لمنع اهتزاز الشريط */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .nav-inner {
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .nav-item-bottom {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            color: #2D5A4C;
            background: transparent;
            border-radius: 28px;
            padding: 6px 0 5px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            font-family: 'Cairo', sans-serif;
        }

        .nav-item-bottom i {
            font-size: 1.35rem;
            color: #2D5A4C;
            transition: transform 0.2s;
        }

        .nav-item-bottom span {
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: -0.2px;
            opacity: 0.85;
        }

        .nav-item-bottom:hover {
            background: rgba(45, 90, 76, 0.08);
            transform: translateY(-2px);
        }

        .nav-item-bottom:active {
            transform: scale(0.96);
        }

        /* العنصر النشط (صفحة الصلاة الحالية) */
        .nav-item-bottom.active i,
        .nav-item-bottom.active span {
            color: #c6a43b;
            font-weight: 800;
        }

@media (max-width: 480px) {
            body {
                padding: 15px;
                /* تحديث المسافة السفلية هنا أيضاً */
                padding-bottom: calc(75px + env(safe-area-inset-bottom));
            }
            .container {
                max-width: 100%;
            }
            .nav-item-bottom i {
                font-size: 1.2rem;
            }
            .nav-item-bottom span {
                font-size: 0.65rem;
            }
            /* تحديث مسافة الشريط السفلي للموبايل */
            .bottom-nav-fixed {
                padding: 5px 10px calc(6px + env(safe-area-inset-bottom));
            }
            .luxury-bar {
                margin-top: 55px;
            }
        }
    </style>
</head>
<body>

    <div id="loading" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="premium-spinner"></div>
        <span id="loading-text" style="color: #2D5A4C; font-weight: 600; font-size: 0.9rem;">جاري حساب مواقيت القاهرة...</span>
    </div>

    <div class="container" id="app-container" style="display: none;">
        
        <div class="luxury-bar">
            <div class="location-status" id="location-status">
                <i class="fas fa-location-dot"></i> <span>القاهرة، مصر</span>
            </div>
            <div class="current-time-lux" id="liveClock">--:-- --</div>
        </div>

        <div class="main-card">
            <div class="gold-glow"></div>
            
            <div class="date-row">
                <div class="date-badge hijri-badge" id="hijri-date"><i class="fas fa-moon"></i> ...</div>
                <div class="date-badge gregorian-badge" id="gregorian-date"><i class="fa-regular fa-calendar-alt"></i> ...</div>
            </div>
            
            <div class="prayer-focus">
                <div class="next-prayer-info">
                    <span class="next-prayer-label">الصلاة القادمة</span>
                    <h2 class="next-prayer-name" id="next-prayer-name"><i class="fas fa-mosque"></i> ...</h2>
                </div>
                
                <div class="countdown-container">
                    <div class="countdown" id="countdown">00:00:00</div>
                    <div class="countdown-label">متبقي على الأذان</div>
                </div>
            </div>
        </div>

        <div class="prayers-list" id="prayers-list"></div>

    </div>

    <div class="bottom-nav-fixed">
        <div class="nav-inner">
            <a href="index.html" class="nav-item-bottom" id="homeNavBtn">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </a>
            <a href="quran.html" class="nav-item-bottom" id="quranNavBtn">
                <i class="fas fa-book-open"></i>
                <span>المصحف</span>
            </a>
            <a href="prayer.html" class="nav-item-bottom active" id="prayerNavBtn">
                <i class="fas fa-mosque"></i>
                <span>مواقيت</span>
            </a>
            <a href="radio.html" class="nav-item-bottom" id="radioNavBtn">
                <i class="fas fa-radio"></i>
                <span>الراديو</span>
            </a>
        </div>
    </div>

    <script>
        // القاموس بدون الشروق
        const prayersData = {
            "Fajr": { ar: "الفجر", icon: "fa-cloud-moon" },
            "Dhuhr": { ar: "الظهر", icon: "fa-sun" },
            "Asr": { ar: "العصر", icon: "fa-cloud-sun" },
            "Maghrib": { ar: "المغرب", icon: "fa-cloud-sun" },
            "Isha": { ar: "العشاء", icon: "fa-moon" }
        };

        const prayerOrder = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];

        let timings = {};
        let nextPrayerKey = "";
        let countdownInterval;

        // 1. تحديث الساعة
        function updateLiveClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12 || 12;
            document.getElementById('liveClock').innerText = `${hours.toString().padStart(2, '0')}:${minutes} ${ampm}`;
        }
        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        // 2. جلب مواقيت القاهرة مباشرة بدون طلب الموقع
        function getCairoTimes() {
            document.getElementById('loading-text').innerText = "جاري حساب مواقيت الصلاة للقاهرة...";
            // إحداثيات القاهرة بدقة عالية
            const cairoLat = 30.044420;
            const cairoLng = 31.235712;
            fetchPrayerTimes(cairoLat, cairoLng);
        }

        // 3. جلب المواقيت بناءً على الإحداثيات باستخدام طريقة المساحة المصرية (أعلى دقة)
        async function fetchPrayerTimes(lat, lng) {
            try {
                // استخدام الهيئة العامة للمساحة المصرية (Method 5) كطريقة دقيقة
                const url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=5`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.code !== 200) throw new Error("API error");

                const dateData = data.data.date;
                timings = data.data.timings;

                // التواريخ
                document.getElementById('gregorian-date').innerHTML = `<i class="fa-regular fa-calendar-alt"></i> ${dateData.gregorian.date}`;
                document.getElementById('hijri-date').innerHTML = `<i class="fas fa-moon"></i> ${dateData.hijri.day} ${dateData.hijri.month.ar} ${dateData.hijri.year}`;

                updateUI();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';

                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(updateCountdown, 1000);

            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div style="color:#2D5A4C; font-size:1rem; margin-bottom:10px;">حدث خطأ في جلب البيانات</div>
                    <button onclick="getCairoTimes()" style="background:#2D5A4C; border:none; padding:8px 20px; border-radius:20px; color:#fff; cursor:pointer;">إعادة المحاولة</button>
                `;
            }
        }

        function getPrayerDateObj(timeStr) {
            const [hours, minutes] = timeStr.split(':');
            const dateObj = new Date();
            dateObj.setHours(parseInt(hours), parseInt(minutes), 0, 0);
            return dateObj;
        }

        function formatTime12(timeStr) {
            let [hours, minutes] = timeStr.split(':');
            hours = parseInt(hours);
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12 || 12;
            return `${hours}:${minutes} ${ampm}`;
        }

        function updateUI() {
            const prayersListDiv = document.getElementById('prayers-list');
            prayersListDiv.innerHTML = '';
            const now = new Date();
            let nextFound = false;

            prayerOrder.forEach(key => {
                if (!timings[key]) return;
                const prayerTimeStr = timings[key];
                const prayerDate = getPrayerDateObj(prayerTimeStr);
                const prayerDiv = document.createElement('div');
                prayerDiv.className = 'prayer-item';
                prayerDiv.id = `prayer-${key}`;

                if (prayerDate > now && !nextFound) {
                    nextPrayerKey = key;
                    nextFound = true;
                    prayerDiv.classList.add('active');
                    document.getElementById('next-prayer-name').innerHTML = `<i class="fas ${prayersData[key].icon}"></i> ${prayersData[key].ar}`;
                }

                prayerDiv.innerHTML = `
                    <div class="prayer-name-group">
                        <i class="fas ${prayersData[key].icon} prayer-icon"></i>
                        <span>${prayersData[key].ar}</span>
                    </div>
                    <span class="prayer-time">${formatTime12(prayerTimeStr)}</span>
                `;
                prayersListDiv.appendChild(prayerDiv);
            });

            if (!nextFound) {
                nextPrayerKey = "Fajr";
                document.getElementById('next-prayer-name').innerHTML = `<i class="fas ${prayersData["Fajr"].icon}"></i> ${prayersData["Fajr"].ar}`;
                const fajrElement = document.getElementById('prayer-Fajr');
                if (fajrElement) fajrElement.classList.add('active');
            }

            updateCountdown();
        }

        function updateCountdown() {
            if (!nextPrayerKey || !timings[nextPrayerKey]) return;

            const now = new Date();
            let nextPrayerDate = getPrayerDateObj(timings[nextPrayerKey]);

            if (nextPrayerKey === "Fajr") {
                const currentHour = now.getHours();
                const fajrHour = parseInt(timings["Fajr"].split(':')[0]);
                if ((currentHour >= fajrHour && now > nextPrayerDate) || (now > nextPrayerDate && currentHour >= fajrHour)) {
                    nextPrayerDate.setDate(nextPrayerDate.getDate() + 1);
                }
            } else {
                if (now > nextPrayerDate) {
                    if(countdownInterval) clearInterval(countdownInterval);
                    setTimeout(getCairoTimes, 2000); // تحديث تلقائي بمجرد انتهاء الصلاة
                    return;
                }
            }

            const diff = nextPrayerDate - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = "حان الوقت";
                if(countdownInterval) clearInterval(countdownInterval);
                setTimeout(getCairoTimes, 3000);
                return;
            }

            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            const formatNum = (n) => n.toString().padStart(2, '0');

            document.getElementById('countdown').innerHTML = `${formatNum(hours)}:${formatNum(minutes)}:${formatNum(seconds)}`;
        }

        // تشغيل التطبيق وجلب أوقات القاهرة مباشرة
        getCairoTimes();
    </script>
</body>
</html>
